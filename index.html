<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuCredit - Simulador de Créditos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-dark: #0052a3;
            --secondary-color: #ff6b35;
            --success-color: #00cc66;
            --danger-color: #cc0000;
            --light-bg: #f8f9fa;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --transition: 0.3s ease all;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            padding: 1.5rem 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .header-text h1 {
            color: white;
            margin: 0;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .header-text p {
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem 1rem;
        }

        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Formulario Principal */
        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 2rem;
            margin-bottom: 2rem;
            border-left: 5px solid var(--primary-color);
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--light-bg);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-title i {
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: var(--transition);
            background: #fff;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
            outline: none;
        }

        .input-group-text {
            background: var(--light-bg);
            border: 2px solid #e0e0e0;
            color: #666;
            font-weight: 500;
        }

        /* Botones */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn-calcular {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
            flex: 1;
            min-width: 150px;
        }

        .btn-calcular:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 102, 204, 0.4);
            color: white;
        }

        .btn-limpiar {
            background: var(--light-bg);
            border: 2px solid #e0e0e0;
            color: #333;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            min-width: 150px;
        }

        .btn-limpiar:hover {
            background: #e8eef5;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* Resultados */
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            border-top: 4px solid var(--primary-color);
            transition: var(--transition);
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .result-label {
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .result-icon {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        /* Estado del Crédito */
        .estado-credito {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .estado-credito.aprobado {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #1b5e20;
            border: 2px solid var(--success-color);
            box-shadow: 0 4px 12px rgba(0, 204, 102, 0.2);
        }

        .estado-credito.rechazado {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #b71c1c;
            border: 2px solid var(--danger-color);
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.2);
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 1rem 0;
            }

            .header-text h1 {
                font-size: 1.4rem;
            }

            .form-card {
                padding: 1.5rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-calcular,
            .btn-limpiar {
                width: 100%;
            }

            .results-container {
                grid-template-columns: 1fr;
            }

            main {
                padding: 1rem;
            }
        }

        /* Animaciones */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            animation: slideIn 0.5s ease;
        }

        .result-card {
            animation: slideIn 0.5s ease;
        }

        /* Focus visible para accesibilidad */
        button:focus-visible {
            outline: 2px solid var(--secondary-color);
            outline-offset: 2px;
        }

        input:focus-visible {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <header>
            <div class="container">
                <div class="header-content">
                    <div class="logo-icon">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <div class="header-text">
                        <h1>SimuCredit</h1>
                        <p>Simulador de Créditos Inteligente</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <div class="content-wrapper">
                <!-- Formulario Principal -->
                <div class="form-card">
                    <!-- Sección: Información Personal -->
                    <div class="form-section">
                        <div class="section-title">
                            <i class="fas fa-user-circle"></i>
                            Información Personal
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="ingresos">Ingresos Mensuales (USD)</label>
                                    <input type="number" class="form-control" id="ingresos" placeholder="Ej: 1000" min="0" step="0.01">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="egresos">Egresos Mensuales (USD)</label>
                                    <input type="number" class="form-control" id="egresos" placeholder="Ej: 600" min="0" step="0.01">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sección: Solicitud de Crédito -->
                    <div class="form-section">
                        <div class="section-title">
                            <i class="fas fa-credit-card"></i>
                            Solicitud de Crédito
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="monto">Monto Solicitado (USD)</label>
                                    <input type="number" class="form-control" id="monto" placeholder="Ej: 2000" min="0" step="0.01">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="plazo">Plazo (Años)</label>
                                    <input type="number" class="form-control" id="plazo" placeholder="Ej: 1" min="1" max="30">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="tasa">Tasa Anual (%)</label>
                                    <input type="number" class="form-control" id="tasa" placeholder="Ej: 10" min="0" step="0.01">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="button-group">
                        <button type="button" class="btn-calcular" onclick="calcular()">
                            <i class="fas fa-calculator"></i> Calcular Crédito
                        </button>
                        <button type="button" class="btn-limpiar" onclick="limpiarFormulario()">
                            <i class="fas fa-redo-alt"></i> Limpiar
                        </button>
                    </div>
                </div>

                <!-- Resultados -->
                <div class="results-container" id="resultsContainer">
                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="result-label">Disponible Mensual</div>
                        <div class="result-value" id="lblDisponibleValor">USD 0.00</div>
                    </div>

                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-hand-holding-usd"></i>
                        </div>
                        <div class="result-label">Capacidad de Pago</div>
                        <div class="result-value" id="lblCapacidadValor">USD 0.00</div>
                    </div>

                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-percentage"></i>
                        </div>
                        <div class="result-label">Interés Generado</div>
                        <div class="result-value" id="lblInteresValor">USD 0.00</div>
                    </div>

                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-money-bill-wave"></i>
                        </div>
                        <div class="result-label">Total a Pagar</div>
                        <div class="result-value" id="lblTotalValor">USD 0.00</div>
                    </div>

                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="result-label">Cuota Mensual</div>
                        <div class="result-value" id="lblCuotaValor">USD 0.00</div>
                    </div>
                </div>

                <!-- Estado del Crédito -->
                <div class="estado-credito" id="lblEstadoCredito"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 SimuCredit - Simulador de Créditos | Todos los derechos reservados</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</body>
</html>
